summary: >-
  Members of the National Parliament of Timor-Leste, the unicameral legislature.
description: |
  The National Parliament (Parlamento Nacional) is the unicameral legislature of
  Timor-Leste. Its 65 members are elected from a single nationwide constituency under
  closed-list proportional representation for a five-year term. The current term is the
  VI Legislatura (2023–2028).

  This dataset records each member with their name, functional role in the Parliament and
  parliamentary group (party), from the official legislature roster.
