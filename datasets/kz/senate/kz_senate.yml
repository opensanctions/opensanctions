summary: >-
  Senators of the upper chamber of the Parliament of the Republic of Kazakhstan
description: |
  Members of the Senate, the upper chamber of the bicameral Parliament of the Republic
  of Kazakhstan. The Senate has 49 seats — 40 elected indirectly by the maslikhats (two
  per region and city of republican significance) and 9 appointed by the President — for
  six-year terms, half rotating every three years.

  This dataset records each sitting senator with their name, sourced from the Senate's
  official website.
