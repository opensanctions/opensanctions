summary: >-
  Members of the National Assembly of Serbia, the unicameral parliament.
description: |
  The National Assembly (Narodna skupština) is the unicameral parliament of the
  Republic of Serbia, with 250 seats.

  This dataset is scraped from the Assembly's official roster. It covers the members
  of the current convocation as well as the members of past convocations published in
  the Assembly's archive, so that politicians who served in earlier terms remain in the
  data. Members who left a convocation before its end are listed with the start and end
  dates of their mandate; members who served a full past term are dated to the
  convocation's own period.
