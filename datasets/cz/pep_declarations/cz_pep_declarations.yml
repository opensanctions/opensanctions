  frequency: monthly
  start: 2026-02-12
load_statements: true
entry_point: crawler.py
summary: >-
  Czech public officials registered in the Central Register of Declarations
  (Centrální registr oznámení), covering parliament, judiciary, and local
  government.
description: |
  The Central Register of Declarations (CRO) publishes asset and interest
  declarations filed by public officials under the Czech Conflict of Interest
  Act (No. 159/2006 Coll.), covering MPs, senators, judges, and senior
  managers of state institutions. Each declaration includes the declarant's
  current position and recent roles, which are used to determine PEP status.
