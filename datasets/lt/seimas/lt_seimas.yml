title: Lithuania Members of the Seimas
entry_point: crawler.py
prefix: lt-seimas
# Fetches via the Zyte API (Cloudflare-protected source), which needs a key
# that CI doesn't provide, so skip the changed-dataset crawl check.
ci_test: false
summary: >-
  Current and recent members of the Seimas, Lithuania's unicameral parliament
coverage:
  frequency: weekly
  start: 2024-01-18
load_statements: true
description: |
  The Seimas of the Republic of Lithuania is the unicameral parliament
  responsible for exercising legislative power in Lithuania

  Members of the Seimas are elected to serve a four-year term through parallel voting,
  with a portion elected in single-seat constituencies and another through proportional
  representation. The election process involves ordinary elections, with both single-seat
  constituencies and proportional representation determining the composition of the Seimas.
  [Source: Wikipedia](https://en.wikipedia.org/wiki/Seimas)

  This dataset publishes the name, position, date of birth, place of birth and occupancy of
  Members of Seimas
publisher:
  name: Seimas of the Republic of Lithuania
  acronym: Seimas
  description: >
    The Seimas of the Republic of Lithuania exercises legislative power in Lithuania.
    The powers of the Seimas are defined by the Constitution and the laws of Lithuania.
    The primary function of the Seimas is to consider, adopt and issue laws and amendments to the Constitution
    [Source: Wikipedia](https://en.wikipedia.org/wiki/Seimas)
  url: https://www.lrs.lt
  country: lt
  official: true
tags:
  - list.pep
url: https://www.lrs.lt/sip/portal.show?p_r=35299&p_k=2
data:
  url: https://www.lrs.lt/sip/portal.show?p_r=35299&p_k=2
  format: HTML

dates:
  # "%d %B %Y" for birth dates ("27 December 1962"), "%d/%m/%Y" for the older
  # legislatures' occupancy dates ("15/11/2004"). ISO dates ("2012-11-16") used
  # by more recent legacy pages are parsed by default.
  formats: ["%d %B %Y", "%d/%m/%Y"]

lookups:
  # Source DOB strings carry formatting noise the date parser rejects:
  # a missing space ("3 May1958") and a trailing period ("19 August 1951.").
  type.date:
    options:
      - match: "3 May1958"
        value: "1958-05-03"
      - match: "19 August 1951."
        value: "1951-08-19"

assertions:
  # Covers the current legislature plus historical ones back to the PEP
  # after-office cutoff, so the count is far higher than a single term.
  min:
    schema_entities:
      Person: 400
      Position: 1
  max:
    schema_entities:
      Person: 600
