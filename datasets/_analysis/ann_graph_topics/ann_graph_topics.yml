type: external
title: Graph-based entity tagging
entry_point: analyzer
prefix: gra
disabled: false
hidden: true
coverage:
  frequency: daily
  start: 2023-12-21
  schedule: "0 */6 * * *"
exports:
  - statistics.json
  - entities.ftm.json
deploy:
  cpu: "1000m"
  cpu_limit: "2000m"
  memory: "2000Mi"
  memory_limit: "3000Mi"
  disk: "150Gi"
load_statements: true
ci_test: false
summary: >
  Automatically generated graph-based topic annotations
description: |
  This data sources stores annotations of entities which are adjacent to other
  risk-linked entities. For example, a person linked via a family bond to a PEP
  is considered a "relative or close associate" (RCA). Similarly, entities
  linked to sanctioned entities (especially subsidiaries) are tagges as
  "sanction-linked".
url: https://opensanctions.org/datasets/graphtopics
publisher:
  name: OpenSanctions
  description: |
    OpenSanctions is the company behind the OpenSanctions database of persons
    and companies of political, criminal, or economic interest.
  url: https://opensanctions.org
  official: false

inputs:
  - default
  # - sanctions
  # - ru_rupep

assertions:
  min:
    schema_entities:
      LegalEntity: 65000
      Security: 150
      Vessel: 15
    # This is a patch dataset: its rules emit minimal patches carrying only the
    # `topics` property (see analyzer.py module docstring), so emitted
    # LegalEntity entities legitimately have no `name`. Disable the default
    # `min.property_fill_rate.LegalEntity.name` (0.95) which would otherwise
    # fail the run at a fill rate of 0.0.
    property_fill_rate:
      LegalEntity:
        name: 0
  max:
    schema_entities:
      LegalEntity: 130000
      Security: 12000
      Vessel: 900
