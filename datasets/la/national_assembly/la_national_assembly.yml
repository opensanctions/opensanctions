summary: >-
  Deputies of the National Assembly of the Lao People's Democratic Republic.
description: |
  The National Assembly (Sapha Heng Saht) is the unicameral legislature of the Lao People's
  Democratic Republic. Its deputies are elected from provincial constituencies for a
  five-year term.

  This dataset records each sitting deputy by name, discovered from the per-constituency
  listings linked from the National Assembly's members hub.
