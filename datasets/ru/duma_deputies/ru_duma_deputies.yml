description: |
  The State Duma (Государственная Дума) is the lower house of the Federal Assembly of
  Russia. It has 450 deputies elected for five-year terms, half via single-mandate
  constituencies and half via party lists under proportional representation. The dataset
  covers current members of the sitting convocation only.
