name: ru_federation_council
title: Russia Federation Council Members
prefix: ru-fedco
entry_point: crawler.py
coverage:
  frequency: weekly
  start: 2026-06-29
load_statements: true
ci_test: false
summary: >-
  Members of the Federation Council, the upper chamber of the Federal Assembly of Russia.
description: |
  The Federation Council (Совет Федерации) is the upper house of the Russian Federal
  Assembly. Each of Russia's 89 federal subjects sends two representatives — one appointed
  by the regional executive body and one by the regional legislature. Senators must be Russian
  citizens. This crawler collects current members from the official council website, capturing
  names in both Cyrillic and Latin script.
url: http://council.gov.ru/en/structure/members/
publisher:
  name: Federation Council of the Federal Assembly of the Russian Federation
  acronym: SF RF
  description: >
    The Federation Council is the upper house of the Federal Assembly of Russia,
    representing the federal subjects of the Russian Federation.
  url: http://council.gov.ru/
  country: ru
  official: true
data:
  url: http://council.gov.ru/en/structure/members/
  format: HTML
  lang: eng
dates:
  formats:
    - "%B %d, %Y"   # September 19, 1967
    - "%B %Y"       # September 2030
    - "%d %B %Y"       # 19 September 1967

