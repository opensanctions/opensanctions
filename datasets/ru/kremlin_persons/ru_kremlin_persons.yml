summary: >-
  Russian senior officials and those associated with the President of Russia.
description: |
  People associated with the President of Russia, including presidential
  administration staff, government and security officials, regional leaders,
  and other individuals who have served under or worked with the President.
  Some currently hold public office.

  For each person, the dataset records their name, official biography, date and
  place of birth (where available), and their current or most recent public
  position. It is intended as a research resource.
url: http://en.kremlin.ru/catalog/persons
publisher:
