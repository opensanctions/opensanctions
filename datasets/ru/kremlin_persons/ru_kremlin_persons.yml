name: ru_kremlin_persons
title: Russia Kremlin Catalog of Persons
prefix: ru-kremlin
entry_point: crawler.py
coverage:
  frequency: weekly
  start: 2026-07-01
load_statements: true
ci_test: false
summary: >-
  Officials, presidential aides, and other notable persons profiled in the
  Kremlin's "Reference information on persons" directory, with their current
  or most recently held Russian state position.
description: |
  The "Reference information on persons" section of the Kremlin's official
  website is a directory of presidential administration staff, government
  officials, security service and executive branch appointees, regional
  heads, and other figures who have interacted with or served under the
  President of Russia. It also profiles a smaller number of foreign heads of
  state and government; this crawler only captures persons whose listed
  position is at a Russian state body.

  The directory does not separately flag current versus former
  officeholders: an undated position title means the person currently holds
  it, while a title suffixed with a year range gives the period during which
  they held it. Only the most recently listed position is captured, not each
  person's full career history.
url: http://en.kremlin.ru/catalog/persons
publisher:
  name: Website of the President of Russia
  acronym: Kremlin
  description: >
    The official website of the President of Russia, published by the
    Presidential Executive Office.
  url: http://en.kremlin.ru/
  country: ru
  official: true
data:
  url: http://en.kremlin.ru/catalog/persons
  format: HTML
  lang: eng

tags:
  - list.pep

lookups:
  # Maps the biography's free-text "Born ..." line to a birth date and cleaned
  # place name(s). Add an option per unmatched line reported by the crawler; a
  # place given as "X (now Y)" is captured as both the historical and modern name.
  birth:
    options:
      - match: "Born September 14, 1965, in Leningrad."
        birth_date: "1965-09-14"
        birth_place:
          - Leningrad
          - St Petersburg
      - match: "Born on January 31, 1953, in Leningrad (now St Petersburg)."
        birth_date: "1953-01-31"
        birth_place:
          - Leningrad
          - St Petersburg
      - match: "Born on March 26, 1972, in Moscow."
        birth_date: "1972-03-26"
        birth_place:
          - Moscow
      - match: "Born on September 19, 1965 in Moscow."
        birth_date: "1965-09-19"
        birth_place:
          - Moscow

assertions:
  min:
    schema_entities:
      Person: 1
      Position: 1
  max:
    schema_entities:
      Person: 700
      Position: 700
