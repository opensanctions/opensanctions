summary: >-
  Companies debarred from Philippine government procurement by the
  Government Procurement Policy Board (GPPB).

description: |
  The Consolidated Blacklisting Report (CBR) lists entities that have been
  debarred from participating in Philippine government procurement under
  the country's procurement law — Republic Act 9184 (Government Procurement
  Reform Act), repealed and replaced by Republic Act 12009 (New Government
  Procurement Act) effective August 2024; entries issued before then were
  made under RA 9184. Entities are debarred for offenses such as failure
  to comply with contractual obligations, unsatisfactory progress, or submission
  of falsified documents.

  Debarment periods are typically one year (first offense) or two years
  (second offense). Permanent debarment may apply in specific cases. Entities
  are automatically delisted at the end of the period unless removed earlier
  by a lawful order.
