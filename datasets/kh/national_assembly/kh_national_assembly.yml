description: |
  The National Assembly is the lower chamber of the Parliament of Cambodia. Its 125 members
  are directly elected from the provinces under proportional representation for a five-year
  term. The current legislature is the 7th mandate, inaugurated on 21 August 2023.

  This dataset records each member with their name, the province they represent and their
  political party, from the National Assembly's official directory.
