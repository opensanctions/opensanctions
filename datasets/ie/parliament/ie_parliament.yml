summary: >-
  Current and Historical Members of the Irish Parliament (Oireachtas Éireann)
description: |
  Members of the bicameral Irish Parliament (Oireachtas Éireann), consisting
  of the president of Ireland and the two houses of the Oireachtas:
  a lower house called Dáil Éireann and an upper house called Seanad Éireann.

  The lower house, Dáil Éireann, is the primary legislative body with 174 members elected by
  proportional representation for a five-year term, representing 43 constituencies.

  The upper house, Seanad Éireann, consists of 60 senators that are elected to five vocational panels and
  from two university constituencies, or they are nominated by the Taoiseach (head of government).

  The data is sourced from the official open data provided by the Irish Parliament,
  containing comprehensive mandate information, including name, gender, political party, electoral district,
  and legislative periods of service for all parliamentary members since 1919.
