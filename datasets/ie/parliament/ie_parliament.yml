ci_test: true
summary: >-
  Current and recent Members of the Irish Parliament, covering the Dáil Éireann (lower house)
  and Seanad Éireann (upper house).
description: |
  The bicameral Irish Parliament (Oireachtas Éireann) consists of the President of Ireland and
  the two houses of the Oireachtas: Dáil Éireann and Seanad Éireann.

  - Dáil Éireann, the lower house, is the primary legislative body, comprising 174 members who
  are elected by proportional representation for a five-year term.
  - The upper house, the Seanad Éireann, is not directly elected and consists of 60 senators chosen
  by various methods.

  The dataset includes comprehensive mandate information for each member, including their name, gender,
  political affiliation, electoral district and dates of service.
url: https://api.oireachtas.ie/
