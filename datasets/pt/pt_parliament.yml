description: |
  The Assembleia da República of the Republic of Portugal is the lower house of the National Assembly. It is
  composed of 230 deputies elected for a four-year term. The Assembleia da República is responsible for enacting
  laws, approving the budget, and overseeing the government. Members of the Assembleia da República are elected
  through a proportional representation system, with each member representing a specific
  electoral district.
