summary: >-
  Members of the Senate of Thailand, the upper chamber of the National Assembly.
description: |
  The Senate is the upper chamber of the National Assembly of Thailand. Its 200 members are
  indirectly selected across 20 occupational groups for a five-year term. The current
  Senate is Council 12 (B.E. 2567), seated on 10 July 2024.

  This dataset records each senator with their name, occupational group, and the dates
  their term began and (where applicable) ended, from the Senate Secretariat's open-data
  catalogue.
