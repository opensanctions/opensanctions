title: Thailand Cabinet of Ministers
entry_point: crawler.py
prefix: th-min
coverage:
  frequency: daily
  start: 2024-10-15
load_statements: true
ci_test: false
summary: >
  List of the current members of the Thai Cabinet of Ministers.
  It includes the names and official positions of each cabinet member.
description: |
  This dataset comprises information about the Thai Cabinet of Ministers. It includes
  the names of the ministers, their respective positions, and relevant details about
  their roles within the government.
publisher:
  name: Secretariat of the Prime Minister
  acronym: SPM
  description: >
    The Secretariat of the Prime Minister (SPM) supports the Prime Minister's
    political and administrative functions, coordinates executive policy
    implementation, and manages government protocol.
  url: https://www.thaigov.go.th/en/home
  official: true
  country: "th"
tags:
  - list.pep
url: https://www.thaigov.go.th/en/cabinet/minister
data:
  url: https://www.thaigov.go.th/en/cabinet/minister
  format: HTML
http:
  # The source sits behind a Cloudflare "Just a moment..." JS challenge, which
  # Zyte solves via browser rendering. Solving it can take longer than the
  # default 60s read timeout, so give the Zyte API more time to respond.
  timeout: 180

assertions:
  min:
    schema_entities:
      Person: 30
  max:
    schema_entities:
      Person: 50
