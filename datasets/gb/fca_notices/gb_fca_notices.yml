summary: >-
  List of firms and individuals that the UK Financial Conduct Authority has
  warned consumers about, because they appear to be operating without proper
  authorisation or are suspected of carrying out financial scams.
description: |
  The Financial Conduct Authority (FCA) publishes a warning list of firms and
  individuals that are not authorised or registered by the FCA, or which appear
  to be impersonating legitimate authorised firms (clone firms). Consumers are
  warned not to deal with these entities.

  The list is continuously updated and includes entities operating in the UK
  financial services sector without the required FCA authorisation.
url: https://www.fca.org.uk/consumers/warning-list-unauthorised-firms
