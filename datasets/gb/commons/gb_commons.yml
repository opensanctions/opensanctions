title: UK House of Commons
entry_point: crawler.py
prefix: gb-commons
coverage:
  frequency: monthly
  start: 2024-07-04
load_statements: true
ci_test: false

summary: >-
  Current Members of Parliament sitting in the House of Commons of the
  United Kingdom.

description: |
  The House of Commons is the elected lower house of the Parliament of the
  United Kingdom. Members of Parliament (MPs) are elected to represent
  geographic constituencies.

  This dataset is sourced from the official UK Parliament Members API, which
  publishes the roster of current MPs along with their party affiliation,
  constituency and the date they entered the House.
url: https://members-api.parliament.uk/

publisher:
  name: UK Parliament
  description: >
    The Parliament of the United Kingdom is the supreme legislative body of the
    United Kingdom. It maintains the Members API, an official service exposing
    structured data about current and former members of both Houses.
  url: https://www.parliament.uk/
  country: gb
  official: true

data:
  url: https://members-api.parliament.uk/api/Members/Search?House=Commons&IsCurrentMember=true
  format: JSON
  lang: eng

tags:
  - list.pep

lookups:
  type.gender:
    normalize: true
    options:
      - match: F
        value: female
      - match: M
        value: male

assertions:
  min:
    schema_entities:
      Person: 510
      Position: 1
    country_entities:
      gb: 510
  max:
    schema_entities:
      Person: 970
      Position: 1
