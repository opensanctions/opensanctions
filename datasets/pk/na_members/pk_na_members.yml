description: |
  Current members of the National Assembly, the directly elected lower house of the
  bicameral Majlis-e-Shoora (Parliament) of Pakistan. Its members are elected on
  general and reserved (women and non-Muslim) seats for a five-year term, unless the
  assembly is dissolved earlier, and hold the country's legislative power, including
  passing laws and electing the Prime Minister.

  This dataset records each sitting member with their name, political party, national
  identity number (CNIC) where published, and the date they took their oath of office.
