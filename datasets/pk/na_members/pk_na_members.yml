summary: >-
  Members of the National Assembly of Pakistan, the directly-elected
  lower house of the Majlis-e-Shoora (Parliament).
description: |
  The National Assembly is the lower house of the bicameral Majlis-e-Shoora
  (Parliament) of Pakistan. Its members are directly elected on general and
  reserved (women and non-Muslim) seats and serve a five-year term unless the
  assembly is dissolved earlier.

  This dataset covers the sitting members listed on the official National
  Assembly website. Each member is emitted as a person holding the position of
  Member of the National Assembly, with the occupancy start taken from the
  member's recorded oath-taking date. The roster is refreshed as by-elections
  fill vacant seats and is replaced wholesale after each general election.
