title: Bulgaria Members of the National Assembly
entry_point: crawler.py
prefix: bg-na
coverage:
  frequency: monthly
  start: 2026-06-11
load_statements: true
ci_test: false
summary: >-
  Members of the National Assembly of Bulgaria, the country's unicameral legislature.
description: |
  Current and historical members of the National Assembly (Bulgarian: Народно събрание, Narodno sabranie),
  the unicameral parliament of the Republic of Bulgaria, composed of 240 members elected
  for a four-year term. It exercises legislative power, elects and dismisses the
  Council of Ministers, and adopts the state budget.

  This dataset covers members of the National Assembly across the assemblies for which
  the parliament publishes structured data (the 39th assembly onward),
  including their membership terms.

  The data is sourced from the JSON API that powers the official parliament website,
  which exposes the roster of each assembly and a per-member profile with biographical
  details and a full membership history.
url: https://www.parliament.bg/en/MP
publisher:
  name: National Assembly of the Republic of Bulgaria
  acronym: NA
  description: |
    The National Assembly is the supreme representative and legislative body of
    Bulgaria. It publishes information about its members on its official website.
  country: bg
  url: https://www.parliament.bg/
  official: true
data:
  url: https://www.parliament.bg/api/v1/fn-assembly/en
  format: JSON
  lang: bul

assertions:
  min:
    schema_entities:
      Person: 200
      Position: 1
    country_entities:
      bg: 200
  max:
    schema_entities:
      Person: 4000

lookups:
  type.email:
    options:
      - match: ""
        value: null
  type.language:
    options:
      - match: Serbian/Croatian
        values:
          - srp
          - hrv
      - match: Slovakian
        value: slk
      - match: Arabian
        value: ara
      - match:
          - Latin
          - Romany
          - Gypsy
        value: null
  type.date:
    options:
      - match: "0000-00-00"
        value: null
