summary: >-
  Members of the Parliament of Singapore, the unicameral national legislature.
description: |
  The Parliament of Singapore is the country's unicameral legislature. It comprises elected
  members from Group Representation Constituencies (GRCs) and Single Member Constituencies
  (SMCs), Non-Constituency Members (NCMPs) drawn from the best-performing losing candidates,
  and Nominated Members (NMPs) appointed by the President.

  This dataset records each sitting member with their name and constituency (or NCMP/NMP
  designation) as published in the official list of current MPs.
