title: "Saudi Arabia National Terrorism List (1373)"
entry_point: crawler.py
prefix: sa-pcct
coverage:
  frequency: daily
  start: "2024-06-13"
load_statements: true
ci_test: false
summary: >-
  Individuals, entities and vessels designated by Saudi Arabia's Permanent Committee
  for Counter-Terrorism under UN Security Council Resolution 1373.
description: |
  The National Terrorism List is maintained by the Permanent Committee for
  Counter-Terrorism (PCCT), which operates under the Presidency of State Security
  of the Kingdom of Saudi Arabia. It implements UN Security Council Resolution 1373
  (2001), imposing asset freezes and other measures on persons, organizations and
  vessels designated for their involvement in, or support of, terrorist acts.

  The committee publishes the list in Arabic and English as downloadable spreadsheets,
  split into three sections: individuals, entities and vessels. This crawler parses the
  English workbook.
publisher:
  name: Permanent Committee for Counter-Terrorism
  acronym: PCCT
  description: >
    The Permanent Committee for Counter-Terrorism operates under the Presidency of
    State Security and is responsible for designating and delisting persons, entities
    and vessels on Saudi Arabia's National Terrorism List.
  url: https://pctc.pss.gov.sa/
  country: sa
  official: true
url: https://pctc.pss.gov.sa/wps/portal/departments/pcct/lists/
data:
  url: https://pctc.pss.gov.sa/portal/pcct/slist/js/slistEN.xlsx
  format: XLSX
  lang: eng

dates:
  formats: ["%Y/%m/%d", "%Y"]

tags:
  - list.sanction

assertions:
  min:
    schema_entities:
      Person: 180
      Organization: 90
      Vessel: 5
    country_entities:
      sa: 1
  max:
    schema_entities:
      Person: 400
      Organization: 200
      Vessel: 30

lookups:
  # Maps each worksheet to the FTM schema of its rows.
  schema:
    normalize: true
    options:
      - match: Individuals
        value: Person
      - match: Entities
        value: Organization
      - match: Vessels
        value: Vessel
  # Normalizes the differing per-sheet headers to one common vocabulary.
  columns:
    normalize: true
    options:
      - match: [Full Name, Entities Name, Vessel Name]
        value: name
      - match: Aliases
        value: alias
      - match: Gender
        value: gender
      - match: Link of Terrorism Org.
        value: linked_org
      - match: DOB
        value: birth_date
      - match: POB
        value: birth_place
      - match: COB
        value: birth_country
      - match: Nationality
        value: nationality
      - match: Document Type
        value: doc_type
      - match: Document No.
        value: doc_number
      - match: Issuing Country
        value: issuing_country
      - match: Registration Number
        value: reg_number
      - match: Vessel Flag
        value: flag
      - match: IMO No.
        value: imo_number
      - match: Owner Name
        value: owner_name
      - match: Owner information
        value: owner_info
      - match: Address
        value: address
      - match: [Additional Information, Additional info.]
        value: notes
      - match: Designated Date
        value: designated_date
      - match: "No."
        value: "no"
  # Flags which document-type labels are passports (others become Identifications).
  document.type:
    normalize: true
    lowercase: true
    options:
      - match: Passport
        value: passport
      - match:
          - National ID
          - National identification
          - Residency Number
        value: id
  # Spells out document cells that aren't a single number from a single country:
  # multiple numbers, multiple countries, prose blobs, inline annotations. Each
  # option is keyed on the raw number cell and supplies aligned numbers/countries.
  documents:
    normalize: true
    options:
      - match: "RL 0962973; RL 3203273"
        numbers: ["RL0962973", "RL3203273"]
        countries: [Lebanon, Lebanon]
