title: Belgium Flemish Parliament
prefix: be-vla-parl
url: https://www.vlaamsparlement.be
coverage:
  frequency: monthly
  start: 2026-04-15
load_statements: true
entry_point: crawler.py
summary: >-
  Current members of the Flemish Parliament, the legislative assembly of the Flemish
  Region in Belgium.
description: |
  This dataset provides information about the current members of the Flemish Parliament
  (Vlaams Parlement). It includes details about each member, such as name, political
  affiliation, and electoral district. The Flemish Parliament has 124 directly elected
  members representing six electoral districts (kieskringen).
tags:
  - list.pep
publisher:
  name: Vlaams Parlement
  name_en: Flemish Parliament
  description: |
    The Flemish Parliament (Vlaams Parlement) is the legislative assembly of the Flemish
    Region, one of Belgium's three federal regions. Its 124 members are directly elected
    for five-year terms and are responsible for enacting laws and overseeing the Flemish
    government.
  country: be
  url: https://www.vlaamsparlement.be
  official: true
data:
  url: http://ws.vlpar.be/e/opendata/vv/huidige/perkieskring
  format: JSON
  lang: nld

# 124 members across 6 kieskringen
assertions:
  min:
    schema_entities:
      Person: 110
      Position: 1
    country_entities:
      be: 1

lookups:
  type.gender:
    options:
      - match: M
        value: male
      - match: V
        value: female
