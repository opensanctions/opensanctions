type: collection
title: Politically Exposed Persons Datasets
coverage:
  start: "2021-12-01"
  frequency: daily
deploy:
  memory: "1500Mi"
  memory_limit: "2000Mi"
  cpu: "500m"
ci_test: false
exports:
  - statistics.json
  - entities.ftm.json
  - names.txt
  - senzing.json
  - targets.nested.json
  - targets.simple.csv
summary: >
  A politically exposed person (PEP) is a person that has been entrusted with
  a prominent public function. PEPs include elected officials and members of
  government.
description: |
  This collection contains data about politically exposed persons (PEPs) from
  multiple sources. We include lists of office-holders both directly from
  official sources like governments and also from third-party sources that
  have been aggregated by other organizations.

  **IMPORTANT: We discourage the use of this collection on its own, as it does
  not include some relevant information from enrichment sources. [Read the FAQ
  item](https://www.opensanctions.org/faq/165/peps-only/).**
