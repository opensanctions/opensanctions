title: China Sanctions Research
entry_point: crawler.py
prefix: cn-sanc
coverage:
  frequency: never
  start: 2024-03-08
manual_check:
  last_checked: "2026-06-29"
  interval: 45
  message: >
    Review official Chinese authorities not covered by automated MFA, MOFCOM, and
    Taiwan Affairs Office discovery — including Chinese embassies and other State
    Council departments — for new designation or list-change notices.
deploy:
  schedule: "30 6 * * *"
  issues_turns: 500
load_statements: true
summary: >
  Individuals and organisations targeted by the Anti-Foreign Sanctions Law,
  Counter-Measures List, Unreliable Entities List (UEL), Export Control List,
  and Export Control Watch List.
description: |
  China does not publish structured data on individuals and entities targeted by the
  country's sanctions legislation. This dataset is a partial list of individuals and
  organisations officially designated or listed by Chinese government authorities.

  Chinese sanctions are often framed as countermeasures against foreign sanctions
  and to reprimand public figures for criticizing China's policies, particularly
  regarding Hong Kong, Taiwan, and Xinjiang province.

  The dataset also covers entities subject to trade restrictions under the Unreliable
  Entities List (UEL), Export Control List, and Export Control Watch List.

  **Note**: This dataset is not comprehensive and should be used as a research
  tool but not as a definitive source of sanctions data on China.

  * [How China imposes sanctions](https://merics.org/en/report/how-china-imposes-sanctions) (MERICS)
  * [MFA Anti-Sanctions List and Measures](https://www.mfa.gov.cn/wjb_673085/zfxxgk_674865/gknrlb/fzcqdcs/)

  See the [designation extraction guide](https://github.com/opensanctions/opensanctions/blob/main/datasets/cn/sanctions/docs/extraction.md)
  for the conventions used to turn official notices into structured rows.
publisher:
  name: OpenSanctions
  description: |
    This dataset combines data published by various government departments,
    including the Ministry of Commerce, a state agency responsible for the
    regulation of economic activities such as trade, commodity inspection
    and industry; as well as the Ministry of Foreign Affairs, which is
    responsible for China's foreign relations and international diplomacy;
    and the Taiwan Affairs Office of the State Council, which is responsible
    for policy relating to Taiwan.
  url: https://www.opensanctions.org/
  official: false
  country: cn
url: https://github.com/opensanctions/opensanctions/blob/main/datasets/cn/sanctions/sanctions.csv
data:
  url: https://raw.githubusercontent.com/opensanctions/opensanctions/refs/heads/main/datasets/cn/sanctions/sanctions.csv
  format: CSV
dates:
  formats: ["%d.%m.%y", "%d.%m.%Y"]
tags:
  - list.sanction.counter
  - list.export
  - target.us

assertions:
  min:
    schema_entities:
      Person: 90
      Company: 45
      Organization: 20

lookups:
  sanction.program:
    options:
      - match: UEL
        value: CN-UEL
      - match:
          - Decision on Countermeasures against U.S. military-industry enterprises and senior managers
          - Decision on Countermeasures against U.S. Military-industry Enterprises
          - Decision on countermeasures against U.S. Congressman McGowern
          - List of Targets of Countermeasures
          - AFSL
        value: CN-CML
      - match: List of Export Controls
        value: CN-ECL
      - match: Export Control Watch List
        value: CN-ECWL
      - match: Diehard "Taiwan Independence" Separatists
        value: CN-TAO-DIEHARD
      - match: ""
        value: null

config:
  discovery:
    # Handling "Unreviewed designation notice" warnings:
    #
    # 1. Fetch the warning's exact URL. Current MFA and MOFCOM notices are HTML;
    #    `curl -LfsS "$URL"` is normally sufficient. Inspect linked annexes when
    #    the designation names are not present in the main article.
    # 2. Confirm that the page is an official designation/list-change notice.
    #    Do not use press coverage as the source.
    # 3. For an addition, append one sanctions.csv row per named person or legal
    #    entity. Multiple listings of the same entity are intentional: each
    #    designation event should remain a separate row.
    # 4. Use the exact candidate URL in `Source URL`. Once every designation in
    #    the notice is represented, this automatically mutes the warning.
    # 5. If the page is an alternate official URL for represented data, or is
    #    irrelevant, append its exact URL to `reviewed_urls` instead. Never mute
    #    a notice before checking all names and annexes.
    #
    # sanctions.csv conventions:
    # - Type: Person, Company, or Organization.
    # - Name: official Latin-script name where published.
    # - Alias: additional Latin-script names separated by semicolons.
    # - Chinese name: source spelling, when present.
    # - Country: ISO 3166-1 alpha-2 code when identifiable.
    # - Date/End date: DD.MM.YYYY; use the effective date stated in the decision,
    #   which may differ from the publication date in the URL.
    # - Address: preserve the official address as one value.
    # - QID: optional; add only when the identity is certain.
    # - Body: Ministry of Foreign Affairs or Ministry of Commerce.
    # - List of Export Controls -> Topics `export.control`, List
    #   `List of Export Controls`.
    # - Export Control Watch List -> Topics `export.control`, List
    #   `Export Control Watch List`.
    # - Unreliable Entity List -> Topics `sanction.counter`, List `UEL`.
    # - MFA countermeasures -> Topics `sanction.counter`; retain the program/list
    #   wording already used by comparable CSV rows.
    #
    # Preserve existing rows when an official source URL disappears. A formal
    # delisting or suspension is a status-change task and must not be treated as
    # evidence that the original designation never occurred.
    reviewed_urls:
      - https://www.mfa.gov.cn/web/wjb_673085/zfxxgk_674865/gknrlb/fzcqdcs/202212/t20221222_10993979.shtml
      - https://www.mfa.gov.cn/web/wjb_673085/zfxxgk_674865/gknrlb/fzcqdcs/202304/t20230407_11055802.shtml
