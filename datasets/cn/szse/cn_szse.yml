title: China Sanctions Research
entry_point: crawler.py
prefix: cn-szse
coverage:
  frequency: weekly
  start: 2026-03-25
load_statements: true
summary: >
  Individuals and organisations targeted by the Anti-Foreign Sanctions Law,
  Counter-Measures List and the Unreliable Entities List (UEL).
description: |
   Shenzhen Stock Exchange (SZSE) is a self-regulated legal entity under the supervision
    of China Securities Regulatory Commission (CSRC). It also organizes, supervises securities
    trading and performs duties prescribed by laws, regulations, rules and policies. Its main functions
    include providing the venue and facilities for securities trading, formulating operational rules,
    receiving listing applications and arranging securities listing, organizing and supervising securities
    trading, supervising members; regulating listed companies, managing and disseminating market
    information and other functions as approved by the CSRC.

publisher:
