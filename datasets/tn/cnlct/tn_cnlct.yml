title: Tunisia National Counter-Terrorism List
prefix: tn-cnlct
entry_point: crawler.py
coverage:
  frequency: weekly
  start: "2026-06-08"
load_statements: true
ci_test: false
summary: >
  National list of persons, organizations and entities linked to terrorist offences in Tunisia,
  published by the National Commission for Combating Terrorism (CNLCT).
description: |
  The National List of Persons, Organizations and Entities Linked to Terrorist Crimes is
  published by the National Commission for Combating Terrorism (CNLCT) of Tunisia under
  Law No. 2015-26 of August 7, 2015 on counter-terrorism and the prevention of money
  laundering. Listed individuals and entities are subject to asset freezing.
url: http://www.cnlct.tn/fr/?page_id=1684
tags:
  - list.sanction
publisher:
  name: اللجنة الوطنية لمكافحة الإرهاب
  name_en: National Commission for Combating Terrorism
  acronym: CNLCT
  description: >
    The National Commission for Combating Terrorism (CNLCT) is a Tunisian government
    body responsible for implementing the national counter-terrorism strategy, including
    the designation and publication of the national terrorist list.
  url: http://www.cnlct.tn/
  country: tn
  official: true
data:
  url: http://www.cnlct.tn/fr/?page_id=1684
  format: HTML
  lang: fra

dates:
  formats:
    - "%d/%m/%Y"
    - "%d %B %Y"
  months:
    january: janvier
    february: [février, fevrier]
    march: mars
    april: avril
    may: mai
    june: juin
    july: juillet
    august: [août, aout]
    september: septembre
    october: octobre
    november: novembre
    december: [décembre, decembre]

assertions:
  min:
    schema_entities:
      Person: 100
      Organization: 5
  max:
    schema_entities:
      Person: 400
      Organization: 60

lookups:
  columns:
    normalize: true
    options:
      # The sequence-number column carries no header on the French sheet, so
      # parse_xlsx_sheet falls back to the positional name "column_0".
      - match: column_0
        value: seq_num
      - match: Prenom
        value: given_names
      - match: Nom
        value: surname
      - match: Date et Lieu de naissance
        value: dob_place
      - match: Adresse
        value: address
      - match: Nationalité
        value: nationality
      - match: Justification d'Insertion
        value: reason
      - match: Décision et Date d'Inscription
        value: decision
      - match: Dernière Modification
        value: last_modified
      - match: Date et heure de publication sur le site Web de la Commission
        value: pub_date
      - match: Divers
        value: extra

  type.country:
    lowercase: true
    options:
      - match: Tunisienne
        value: tn
      - match: Italienne
        value: it
      - match: Marocaine
        value: ma
      - match: Tunisienne/Belge
        values:
          - tn
          - be
      - match: Tunisienne/ Irlandaise
        values:
          - tn
          - ie
      - match: Tunisienne/Française
        values:
          - tn
          - fr
