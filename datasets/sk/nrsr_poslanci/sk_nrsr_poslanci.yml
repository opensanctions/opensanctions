summary: >-
  Members of the National Council, the parliament of the Slovak Republic.
description: |
  This dataset lists the members (poslanci) of the National Council of the
  Slovak Republic (Národná rada Slovenskej republiky), the sole constitutional
  and legislative body of the Slovak Republic. The roster reflects the members
  of the current electoral term and is updated as the composition of the
  parliament changes. For each member it captures their name, academic title,
  date of birth, political affiliation and official contact details.
