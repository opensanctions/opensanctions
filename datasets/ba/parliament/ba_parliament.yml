summary: >
  Members of the House of Representatives and the House of Peoples.

description: |
  The Parliamentary Assembly of Bosnia and Herzegovina (Parlamentarna skupština
  BiH) is the bicameral state-level legislature. This dataset covers both chambers:

  - The House of Representatives (Predstavnički/Zastupnički dom), the directly
    elected lower house of 42 members — 28 from the Federation of Bosnia and
    Herzegovina and 14 from Republika Srpska — serving four-year terms.
  - The House of Peoples (Dom naroda), the upper house of 15 delegates (five
    Bosniak, five Croat and five Serb) delegated by the entity legislatures.

