          - 'Aslen Kahramanmaraş’lı olup 1978 yılında Ankara’da doğmuştur. 1995 yılında Ankara Tevfik İleri İmam-Hatip Lisesinden 2000 yılında da Ankara Üniversitesi İletişim Fakültesi Radyo, TV ve Sinema Bölümünden mezun olmuştur. Gazi Üniversitesi Sosyal Bilimler Enstitüsü Sosyoloji Bölümünde 2011 yılında başladığı yüksek lisansını "Gündelik Hayatta Televizyon Programlarının Çocukların Kültürel Değer Algılarına Etkisi" konulu tezi ile tamamlamıştır. Doktora Çalışmalarını, Gazi Üniversitesi Sosyal Bilimler Enstitüsü Sosyoloji Bölümünde "Dijital Sosyoloji Bağlamında, Sosyal Medyanın Seçmen Davranışlarına Etkileri" konulu teziyle tamamlamıştır. Dijital Dünyada "Süresiz Toplum" , " Kullanımlar ve Doyumlar Çerçevesinde Sosyal Medya Uygulamaları", "Modernleşme ve Kimlik" medya, dijital sosyoloji, iletişim sosyolojisi alanlarında araştırmaları ve makale çalışmaları bulunmaktadır. Türk Amerikan Derneğinde İngilizce dil eğitimini ve Aile ve Sosyal Politikalar Bakanlığında AEP (Aile Eğitim Programı) eğitici eğitmeni programını tamamlamıştır. Kanal 7 (1996-97) ve TRT’de Yapım Asistanlığı (1998) görevlerinde bulunmuştur. TURUNCU Dergisinde 2005-2014 yılları arasında yazıları yayınlanmıştır. Artı Yaşam Derneğinde kurucu başkan olarak başladığı yardım faaliyetlerine 2014 yılına kadar devam etmiştir. Aynı dernek çatısı altında 2010 yılından itibaren Ceza ve Tevkif Evleri Genel Müdürlüğü Ankara Yenikent Cezaevinde, AK Parti Ankara İl Başkanlığında ve diğer kuruluşlarda "Öykü Atölyesi Projesinin" koordinatörü ve sorumlusu olarak görev almıştır. AK Parti Genel Merkezinde 2012 yılından itibaren Kadın Kollarında, Tanıtım Medya, Teşkilat ve Yerel Yönetimler birimlerinde, başkanlık ve başkan yardımcılığı görevlerinde bulunmuştur. 2012-2014 yılları arasında 1. Bölge koordinatörü olarak teşkilat çalışmalarında görev almıştır. 2016-2018 yılları arasında Genel Merkez Kadın Kolları Tanıtım Medya Başkanlığı, 2018-2021 yılları arasında Genel Merkez Halka İlişkiler Başkan Yardımcılığı görevlerini yürütmüştür. 2021-2025 yılları arasında Genel Merkez Büyük Kongresi ile MKYK yedek üyesi ve Genel Merkez Sosyal Politikalar Başkan Yardımcısı olarak görevlerini yürütmüştür.'
