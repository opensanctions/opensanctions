summary: >-
  Deputies of the National Assembly of Vietnam (Quốc hội), the country's unicameral
  legislature, with biographical details from the official deputy database.
description: |
  The National Assembly (Quốc hội) is the unicameral legislature of Vietnam, with around
  500 deputies elected for five-year terms.

  This dataset captures the deputies of the current legislature as published in the
  National Assembly's official deputy database. Deputies who are removed, dismissed or
  die during the term are marked as former members.
