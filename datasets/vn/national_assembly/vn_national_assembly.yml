summary: >-
  Deputies of the National Assembly of Vietnam (Quốc hội), the country's unicameral
  legislature, with biographical details from the official deputy database.
description: |
  The National Assembly (Quốc hội) is the unicameral legislature of Vietnam, with around
  500 deputies elected for five-year terms.

  This dataset captures the deputies of the current (15th) legislature as published in the
  National Assembly's official deputy database. For each deputy it collects name, date of
  birth, gender, ethnicity, native place, current residence, education, and the
  government roles described on their profile. Deputies who were removed, dismissed or
  died during the term are recorded with an ended occupancy.
