  name_en: National Assembly of the Socialist Republic of Vietnam
  acronym: QH
  description: >
    The National Assembly is the highest representative body and the sole legislative
    organ of the Socialist Republic of Vietnam, electing the country's senior office
    holders and enacting its laws.
  url: https://quochoi.vn/
  country: vn
  official: true
