description: |
  The Legislative Assembly of Queensland is the unicameral legislature of the
  state of Queensland, Australia — the only mainland Australian state without an
  upper house, the Legislative Council having been abolished in 1922. It has 93
  members (MLAs), each elected to a single-member electorate. The roster is
  updated between elections as casual vacancies are filled by by-election. This
  dataset covers the current members listed on the Parliament's website, with
  each member's electorate and party affiliation.

