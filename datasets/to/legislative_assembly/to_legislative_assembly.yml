description: |
  The Legislative Assembly of Tonga (Fale Alea) is the country's unicameral national
  legislature. It is made up of People's Representatives, directly elected from
  single-member constituencies, and Nobles' Representatives, elected by the country's
  hereditary nobles. Both sit as members of the Assembly.

  This dataset records each sitting member, drawn from the official People's
  Representatives and Nobles' Representatives listings, with their name.
