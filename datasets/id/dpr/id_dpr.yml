description: |
  The People's Representative Council (Dewan Perwakilan Rakyat, DPR) is the lower chamber of
  Indonesia's parliament. Its 580 members are elected from 84 electoral districts (dapil)
  across the provinces for a five-year term. The current term is 2024–2029.

  This dataset records each member by name and electoral district, from the Council's
  official member directory.
