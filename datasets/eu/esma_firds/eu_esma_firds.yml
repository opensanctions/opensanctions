title: "EU Financial Instruments Reference Data System (FIRDS)"
entry_point: crawler.py
prefix: eu-firds
coverage:
  frequency: monthly
  start: 2024-03-02
deploy:
  cpu: 1000m
  memory: 3500Mi
  memory_limit: 4000Mi
  disk: 150Gi
resolve: false
ci_test: false
exports:
  - statistics.json
  - entities.ftm.json
  - senzing.json
summary: >
  List of financial instruments and their reference data, as published by the
  European Securities and Markets Authority (ESMA).
description: |
  This is a dataset of financial instruments and their reference data, as published
  by ESMA. The data establishes connections between financial instruments and their
  issuers, and includes information such as the instrument's name, ISIN, and LEI.
publisher:
  name: European Securities and Markets Authority
  acronym: ESMA
  description: |
    ESMA is the EU’s financial markets regulator and supervisor. It publishes a
    number of databases and registers, including the Financial Instruments Reference
    Data System (FIRDS).
  country: eu
  url: https://www.esma.europa.eu/
  official: true
url: https://registers.esma.europa.eu/publication/searchRegister?core=esma_registers_firds_files
data:
  url: https://registers.esma.europa.eu/publication/searchRegister/doRelativeSearch
  format: JSON

assertions:
  min:
    schema_entities:
      Security: 4_000_000
      Organization: 30_000
    property_fill_rate:
      # FIRDS provides issuers only as LEI reference stubs (leiCode, no name);
      # names are resolved downstream via GLEIF. Disable the default 0.95
      # Organization.name fill-rate assertion, which does not apply here.
      Organization:
        name: 0
  max:
    schema_entities:
      Security: 8_000_000
      Organization: 60_000

lookups:
  type.name:
    options:
      # "<10" / ">15" are comparison operators in the instrument name, not markup.
      - match: Endlos-Zertifikat bezogen auf LUS Wikifolio-Index KGV - BUY <10 - SELL >15
        value: Endlos-Zertifikat bezogen auf LUS Wikifolio-Index KGV - BUY <10 - SELL >15
  type.country:
    options:
      - match: EZ
        value: EU
      - match:
          - XD
          - QS
          - NS
          - XC
          - QO
          - YY
          - QM
          - QX
          - XF
          - AN
        value: null
