summary: >-
  Members of the Nitijela, the unicameral legislature of the Marshall Islands.
description: |
  The Nitijela is the unicameral legislature of the Republic of the Marshall Islands.
  Members are elected for four-year terms; the President is elected by and from among the
  members, and cabinet ministers are likewise drawn from the membership, so the President,
  Speaker and ministers all sit as members of the Nitijela alongside the backbench
  senators.

  This dataset records each sitting member with their name and the role (President,
  Speaker, Vice Speaker, minister or senator) under which the source lists them.
