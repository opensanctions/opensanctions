title: "Malaysia Dewan Negara"
entry_point: crawler.py
prefix: my-dn
coverage:
  frequency: monthly
  start: 2026-07-02
load_statements: true
ci_test: false
summary: >-
  Members of the Senate, the upper house of the Parliament of Malaysia
description: |
  Members (senators) of the Dewan Negara, the Senate, which is the upper house
  of the Parliament of Malaysia. Senators serve three-year terms and are either
  appointed by the King (Yang di-Pertuan Agong) or selected by the state
  legislative assemblies. The chamber routinely operates below its 70-seat
  capacity as appointed seats lapse and await reappointment. Each senator,
  including the chamber's presiding officers, is recorded with their name, party
  affiliation, and term of office.

  Senators who also hold an executive office additionally carry their cabinet
  position.
url: https://www.parlimen.gov.my/ahli-dewan-dn.html?uweb=dn&lang=en
publisher:
  name: Parliament of Malaysia
  description: >
    The Parliament of Malaysia is the national legislature, comprising the
    Dewan Rakyat (House of Representatives) and the Dewan Negara (Senate).
  url: https://www.parlimen.gov.my/
  country: my
  official: true
