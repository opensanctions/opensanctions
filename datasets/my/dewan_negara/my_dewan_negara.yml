# The most common honorifics and courtesy titles prepended to Malaysian names.
# Hereditary name particles that are NOT titles (Wan, Syed, Sharifah, Nik,
# Tengku, Raja, ...) are left untouched.
names:
  schema_rules:
    Person:
      reject_strings:
        - "Berhormat "
        - "Seri"
        - "Sri"
        - "YAB"
        - "YB"
        - "Datuk "
        - "Dato"
        - "Datin"
        - "Tuan"
        - "Puan"
        - "Encik"
        - "Cik"
        - "Haji"
        - "Hajah"
        - "Dr."
        - "Prof."
        - "Ir."
        - "Ts."

lookups:
