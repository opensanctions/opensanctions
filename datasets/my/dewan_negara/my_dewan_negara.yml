summary: >-
  Members of the Senate, the upper house of the Parliament of Malaysia
description: |
  Members (senators) of the Malaysian Senate (Dewan Negara), scraped from the
  official parliament portal. Senators serve three-year terms and are either
  appointed by the King (Yang di-Pertuan Agong) or selected by the state
  legislative assemblies. The chamber routinely operates below its 70-seat
  capacity as appointed seats lapse and await reappointment.

  In addition to the senators, the dataset includes the President
  (Yang di-Pertua) and Deputy President of the house, and members' cabinet
  (ministerial) offices.
