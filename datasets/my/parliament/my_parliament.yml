title: Malaysia Members of Parliament
entry_point: crawler.py
prefix: my-parl
coverage:
  frequency: monthly
  start: 2026-07-02
load_statements: true
ci_test: false
summary: >-
  Members of both houses of the Parliament of Malaysia: the Dewan Rakyat (House
  of Representatives) and the Dewan Negara (Senate)
description: |
  Members of the two houses of the Parliament of Malaysia, which together hold
  the country's federal legislative power.

  The Dewan Rakyat, House of Representatives, is the lower house. Its members are
  elected from single-member federal constituencies. Each member, including the chamber's presiding officers,
  is recorded with their name, party affiliation, and the constituency they represent.

  The Dewan Negara, Senate, is the upper house. Its senators serve three-year
  terms and are either appointed by the King (Yang di-Pertuan Agong) or selected
  by the state legislative assemblies. Each senator, including the chamber's presiding officers, is recorded with their name,
  party affiliation, and term of office.

  Members of either house who also hold an executive office additionally carry
  their cabinet position.
url: https://www.parlimen.gov.my/ahli-dewan.html?uweb=dr
publisher:
  name: Parliament of Malaysia
  description: >
    The Parliament of Malaysia is the national legislature, comprising the
    Dewan Rakyat (House of Representatives) and the Dewan Negara (Senate).
  url: https://www.parlimen.gov.my/
  country: my
  official: true
data:
  url: https://www.parlimen.gov.my/
  format: HTML
  lang: eng

dates:
  formats: ["%d.%m.%Y"]

tags:
  - list.pep

# The most common honorifics and courtesy titles
names:
  schema_rules:
    Person:
      reject_strings:
        - "Berhormat "
        - "Seri"
        - "Sri"
        - "YAB"
        - "YB"
        - "Datuk "
        - "Dato"
        - "Datin"
        - "Tuan"
        - "Puan"
        - "Encik"
        - "Cik"
        - "Haji"
        - "Hajah"
        - "Dr."
        - "Prof."
        - "Ir."
        - "Ts."

lookups:
  # "Position in the Parliament" names a presiding office for a handful of
  # members; for everyone else it repeats the ordinary-member designation, is
  # blank, or (in the Senate) leaks the member's cabinet title. Only the
  # presiding offices map to a Position; the rest are enumerated and dropped so
  # that a renamed or newly-created office surfaces as an unmatched-lookup
  # warning instead of being emitted silently. The role labels arrive mostly in
  # Malay even under `lang=en`; the House clerk arrives in English.
  position_in_parliament:
    lowercase: true
    options:
      - match: Yang di-Pertua Dewan Rakyat
        name: Speaker of the Dewan Rakyat
        topics: [gov.legislative, gov.national]
        wikidata_id: Q7574262
      - match: Timbalan Yang di-Pertua Dewan Rakyat
        name: Deputy Speaker of the Dewan Rakyat
        topics: [gov.legislative, gov.national]
        wikidata_id: Q126361900
      - match: Ketua Majlis
        name: Leader of the Dewan Rakyat
        topics: [gov.legislative, gov.national]
      - match: Timbalan Ketua Majlis
        name: Deputy Leader of the Dewan Rakyat
        topics: [gov.legislative, gov.national]
      - match: Secretary Of The House Of Representatives
        name: Secretary of the Dewan Rakyat
        topics: [gov.admin, gov.national]
      - match: Yang di-Pertua Dewan Negara
        name: President of the Dewan Negara
        topics: [gov.legislative, gov.national]
        wikidata_id: Q7241319
      - match: Timbalan Yang di-Pertua Dewan Negara
        name: Deputy President of the Dewan Negara
        topics: [gov.legislative, gov.national]
        wikidata_id: Q134572656
      # Ordinary members and blanks — not a presiding office.
      - match:
          - null
          - Ahli Dewan Negara
          - Ahli Dwan Negara  # source typo for "Ahli Dewan Negara"
        value: null
      # Senators who are also ministers list their cabinet title here; it is
      # already captured from the "Position in Cabinet" field.
      - contains:
          - menteri
          - minister
        value: null
  type.email:
    options:
      - match: "-"
        value: null
      - match: "adamadli@.gov.my"
        value: null

assertions:
  min:
    schema_entities:
      Person: 220
      Position: 40
    country_entities:
      my: 220
  max:
    schema_entities:
      Person: 470
      Position: 120
