summary: >-
  Current members of the National Parliament of Papua New Guinea.
description: |
  The National Parliament of Papua New Guinea is a unicameral legislature with
  111 seats. Members are directly elected: 89 from Open electorates (districts)
  and 22 from Provincial electorates, where the winning candidate serves
  simultaneously as the elected Provincial Governor.
