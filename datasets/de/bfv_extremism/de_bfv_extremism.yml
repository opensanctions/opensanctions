title: Germany's banned organizations involved in foreign-related extremism
prefix: de-bfv
coverage:
  frequency: monthly
  start: 2026-04-08
load_statements: true
entry_point: crawler.py
summary: >-
  Organizations from the field of foreign-related extremism banned at the federal level
  by the Federal Ministry of the Interior (BMI) under Section 3 of the German Associations Act (Vereinsgesetz).
description: |
  Under Article 9, Paragraph 2 of the Basic Law (Grundgesetz), associations can be banned if their purpose or activities violate criminal law or are directed against
  the constitutional order or the principle of international understanding. This list covers
  bans issued exclusively at the federal level by the Federal Ministry of the Interior (BMI)
  under §3 of the Associations Act (VereinsG); state-level bans are handled separately by
  state interior ministries and are not included here.

  The federal and state offices for the protection of the
  constitution create an essential basis for ban measures in advance, often through extensive evidence gathering.
  Following a ban order, they continue to monitor whether activities of former members serve
  the formation of criminal successor or replacement organizations.

  **Note**: The source page also lists symbols and insignia subject to the display prohibition
  under §9 Abs. 1 VereinsG or criminal penalties under §86a Abs. 1 StGB; these are not
  captured in this dataset.
