          Aufgrund des Verdachts der Gründung einer kriminellen Vereinigung im Ausland sowie der Erpressung im besonders schweren Fall und weiterer Straftaten wird nach Oleg Evgenievich NEFEDOV (Нефедов Олег Евгеньевич) gefahndet.
          Oleg Evgenievich NEFEDOV (oder: Oleg Evgenyevich) steht im Verdacht, die Gruppierung hinter der Schadsoftware „Black Basta" gegründet und als deren Rädelsführer geleitet zu haben, wodurch ein wesentlicher Tatbeitrag zur Durchführung von globalen Cyberattacken geleistet wurde. Im Speziellen besteht der Verdacht, dass der Gesuchte unter den Pseudonymen <tramp>, <tr>, <gg>, <AA>, <kurva>, <Washingt0n> und <S.Jimmi> die Ransomware „Black Basta" entwickelte und etablierte. Innerhalb der Gruppierung nahm er die Position des Geschäftsführers ein. Als dieser entschied er über Angriffsziele, rekrutierte Mitarbeiter, wies ihnen Aufgaben zu, nahm an Lösegeldverhandlungen teil, verwaltete die Taterträge aus den Lösegelderpressungen und bezahlte damit die Mitglieder der Gruppierung. Somit hat der Gesuchte als Rädelsführer den fortlaufenden Einsatz der Ransomware „Black Basta" sowie weiterer Schadsoftware unterstützt, mittels derer die Gruppierung fremde Computersysteme infiltrierte, Daten entwendete und Systeme verschlüsselte, um ein Lösegeld, zahlbar in Kryptowährungen, zur Entschlüsselung zu verlangen.
