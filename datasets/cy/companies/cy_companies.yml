name: cy_companies
title: Cyprus company registry
prefix: cy
disabled: false
entry_point: crawler.py
coverage:
  frequency: weekly
  start: 2023-07-28
deploy:
  disk: 30Gi
  memory: 2Gi
exports:
  - statistics.json
  - entities.ftm.json
  - entities.delta.json
resolve: false
ci_test: false
summary: >-
  Cypriot open data on companies, which names their officers but not any shareholders.
publisher:
  name: Department of the Registrar of Companies and Intellectual Property
  acronym: DRCIP
  description: |
    Competent Service for the registration and maintenance of the register
    of Companies, Cooperatives, Trade Names, Trade Marks, Patents,
    Industrial Designs, etc.
  url: https://www.companies.gov.cy/en/
  country: cy
  official: true
url: https://data.gov.cy/el/dataset/mitroo-eggegrammenon-etaireion-emporikon-eponymion-kai-synetairismon-stin-kypro
data:
  url: "https://data.gov.cy/el/dataset/1026/dcat-ap-2.0/json"
  format: CSV
  lang: ell
http:
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/58.0.3029.110 Safari/537.3"

dates:
  formats: ["%d/%m/%Y"]

lookups:
  type.name:
    options:
      # Registered company names that legitimately contain angle brackets:
      # Greek-style << >> quotation marks or bracketed qualifiers. Keep the name
      # intact and silence the HTML/XSS smell warning.
      - match: "PHOENIX TECHNICAL SUPPLIES & SERVICES <CYPRUS> LIMITED"
        value: "PHOENIX TECHNICAL SUPPLIES & SERVICES <CYPRUS> LIMITED"
        silence_warnings: [xss-html-smell]
      - match: "<ΑΠΑΛΟΣ> ΠΟΛΙΤΙΣΜΟΣ ΛΙΜΙΤΕΔ"
        value: "<ΑΠΑΛΟΣ> ΠΟΛΙΤΙΣΜΟΣ ΛΙΜΙΤΕΔ"
        silence_warnings: [xss-html-smell]
      - match: "<<ΕΚΔΟΣΕΙΣ ΠΑΒΕΛ ΛΙΜΙΤΕΔ>>"
        value: "<<ΕΚΔΟΣΕΙΣ ΠΑΒΕΛ ΛΙΜΙΤΕΔ>>"
        silence_warnings: [xss-html-smell]
      - match: "A.I.P. PROPERTIES <4> ALL LIMITED"
        value: "A.I.P. PROPERTIES <4> ALL LIMITED"
        silence_warnings: [xss-html-smell]
      - match: "ΚΑΦΕΝΕΙΟ <<ΤΟ ΜΠΑΚΑΛΙΚΟ ΤΟΥ ΧΑΨΗ>> ΛΙΜΙΤΕΔ"
        value: "ΚΑΦΕΝΕΙΟ <<ΤΟ ΜΠΑΚΑΛΙΚΟ ΤΟΥ ΧΑΨΗ>> ΛΙΜΙΤΕΔ"
        silence_warnings: [xss-html-smell]
      - match: "ΓΕΝΙΚΟ ΕΜΠΟΡΙΟ & ΕΠΙΔΙΟΡΘΩΣΕΙΣ ΑΚΙΝΗΤΩΝ <<Ι.Π.>> ΛΤΔ"
        value: "ΓΕΝΙΚΟ ΕΜΠΟΡΙΟ & ΕΠΙΔΙΟΡΘΩΣΕΙΣ ΑΚΙΝΗΤΩΝ <<Ι.Π.>> ΛΤΔ"
        silence_warnings: [xss-html-smell]
      - match: "ΕΝΩΣΗ ΔΑΝΕΙΟΛΗΠΤΩΝ << ΕΥΝΟΜΙΑ>> ΛΤΔ"
        value: "ΕΝΩΣΗ ΔΑΝΕΙΟΛΗΠΤΩΝ << ΕΥΝΟΜΙΑ>> ΛΤΔ"
        silence_warnings: [xss-html-smell]
      - match: "<<ΓΑΙΑ>> ΕΤΑΙΡΕΙΑ ΠΡΟΩΘΗΣΗΣ ΣΥΜΦΕΡΟΝΤΩΝ ΑΓΡΟΤΩΝ, ΚΑΛΛΙΕΡΓΗΤΩΝ ΚΑΙ ΚΤΗΝΟΤΡΟΦΩΝ ΛΤΔ"
        value: "<<ΓΑΙΑ>> ΕΤΑΙΡΕΙΑ ΠΡΟΩΘΗΣΗΣ ΣΥΜΦΕΡΟΝΤΩΝ ΑΓΡΟΤΩΝ, ΚΑΛΛΙΕΡΓΗΤΩΝ ΚΑΙ ΚΤΗΝΟΤΡΟΦΩΝ ΛΤΔ"
        silence_warnings: [xss-html-smell]
      # A phone number that landed in the officials name column - drop it.
      - match: "4518 567521"
        value: null

assertions:
  min:
    schema_entities:
      Company: 400_000
      LegalEntity: 500_000
  max:
    schema_entities:
      Company: 1000_000
      LegalEntity: 1200_000
