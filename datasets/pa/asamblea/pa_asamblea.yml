summary: >-
  Deputies of the unicameral national legislature of Panama
description: |
  Current deputies of the National Assembly (Asamblea Nacional), the unicameral
  national legislature of Panama. Its 71 deputies are elected by electoral circuit for
  five-year terms and hold the country's legislative power, including passing laws and
  approving the budget.

  This dataset records each currently serving deputy with their name, political party,
  email, and the electoral circuit and province they represent.
