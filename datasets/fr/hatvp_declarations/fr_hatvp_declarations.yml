title: France HATVP Declarations of Interests and Assessments
prefix: fr-hatvp
url: https://www.hatvp.fr/open-data/
coverage:
  frequency: weekly
  start: 2026-02-26
load_statements: true
entry_point: crawler.py
summary: >-
  Declarations of interests and assets, and associated assessments,
  published by the French High Authority for Transparency in Public Life (HATVP).
description: |
  This dataset lists the declarations and assessments published by the
  Haute Autorité pour la Transparence de la vie Publique (HATVP). French
  public officials are required to declare their interests and assets to
  the HATVP, which reviews and publishes them to promote transparency and
  prevent conflicts of interest.

  This dataset provides the national cabinet, regional council presidents and members,
  departmental council presidents, and executives of large public bodies.
  Members of the national assembly and senate, and mayors, are excluded from this dataset
  since other datasets already cover this data.
publisher:
  name: Haute Autorité pour la Transparence de la vie Publique
  name_en: High Authority for Transparency in Public Life
  acronym: HATVP
  description: |
    La Haute Autorité pour la Transparence de la vie Publique (HATVP) is an independent administrative
    authority, responsible for ascertaining and preventing potential conflicts of interest among French 
    public servants and officials.

    HATVP promotes the integrity and exemplarity of public officials, monitors the ethics of civil servants, 
    oversees lobbying and disseminates a culture of integrity. Its independence is guaranteed by the functioning 
    of its executive board and its financial and administrative autonomy.
  country: fr
  url: https://www.hatvp.fr/en/high-authority/institution/
  official: true
data:
  url: https://www.hatvp.fr/open-data/
  format: CSV
tags:
  - list.pep

assertions:
  min:
    schema_entities:
      Person: 5500
      Position: 2000
  max:
    schema_entities:
      LegalEntity: 14000
      Position: 5200

lookups:
  columns:
    options:
      - match: civilite
        value: title
      - match: prenom
        value: first_name
      - match: nom
        value: last_name
      - match: classement
        value: person_slug
      - match: type_mandat
        value: position_type
      - match: qualite
        value: role
      - match: type_document
        value: document_type
      - match: departement
        value: department
      - match: date_publication
        value: publication_date
      - match: date_depot
        value: filing_date
      - match: nom_fichier
        value: file_name
      - match: url_dossier
        value: dossier_url
      - match: open_data
        value: open_data
      - match: statut_publication
        value: publication_status
      - match: id_origine
        value: source_id
      - match: url_photo
        value: photo_url
