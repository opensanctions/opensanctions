type: external
title: PermID Open Data
entry_point: zavod.runner.enrich:enrich
disabled: false
hidden: false
coverage:
  frequency: daily
  start: 2023-11-15
exports:
- statistics.json
- entities.ftm.json
- statements.csv
- targets.simple.csv
deploy:
  cpu: 1000m
  memory: 4000Mi
  disk: 20Gi
http:
  retry_methods:
  - GET
  - POST
load_statements: true
ci_test: false
summary: Permanent Identifier (PermID) is a reference data spine offered by LSEG/Refinitiv
  to help create unique identifiers for organizations that are publicly listed.
description: '> Refinitiv is making available its Permanent Identifiers, or PermIDs,
  and the

  > associated entity masters and metadata to the market. PermIDs are open, permanent

  > and universal identifiers where underlying attributes capture the context of the

  > identity they each represent.

  '
tags:
- sector.financial
url: https://permid.org/about
publisher:
  name: London Stock Exchange Group
  acronym: LSEG
  description: 'With the merger of Refinitiv into LSEG, the PermID service (formerly
    Calais) is

    now offered as an open access API by the company.

    '
  url: https://www.lseg.com/en/about-us/what-we-do
inputs:
- us_ofac_cons
- us_ofac_sdn
- us_sam_exclusions
config:
  type: zavod.enrich.permid:PermIDEnricher
  api_token: ${PERMID_API_TOKEN}
  batch_size: 999
  cache_days: 60
assertions:
  min:
    schema_entities:
      Company: 0
  max:
    schema_entities:
      Company: 10000
