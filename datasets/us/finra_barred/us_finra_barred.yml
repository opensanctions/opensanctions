summary: >
  Individuals barred by FINRA and permanently prohibited from association with any FINRA member in any capacity.
description: |
  This dataset comprises individuals with a FINRA bar in effect, which means they
  are prohibited from association with any FINRA member in any capacity.

  Individuals who have been barred by FINRA as a result of a disciplinary decision or
  expedited proceeding will not appear on this list until the decision becomes a final
  FINRA action and the time period provided for an appeal permitted under the Exchange Act has expired.
