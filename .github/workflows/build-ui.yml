name: Build Zavod UI

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'ui/**'
  pull_request:
    paths:
      - 'ui/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser -d test" --health-interval=5s --health-timeout=5s --health-retries=10
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v7
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run Jest tests
        run: npm test

  docker:
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: [test]
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/opensanctions/zavod-ui
          tags: |
            type=ref,event=branch
            type=raw,value=${{ github.ref == 'refs/heads/main' && 'prod' || 'test' }}
            type=raw,value=latest
      - name: Set build date
        run: echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          install: true
      - name: Login to Github Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push release
        id: build
        uses: docker/build-push-action@v7
        env:
          BUILD_DATE: ${{ env.BUILD_DATE }}
        with:
          context: ui
          pull: true
          push: true
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # GitHub App requirements for workflow dispatch to trigger ETL deploy in operations repo:
  # App name: opensanctions-operations-deployer (or similar)
  # Installed on: opensanctions/operations
  # Permissions: Actions - 'write'
  # Secrets required in this repo:
  #   OPERATIONS_DEPLOY_APP_ID  — numeric GitHub App ID
  #   OPERATIONS_DEPLOY_APP_KEY — PEM private key
  trigger-deploy:
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.OPERATIONS_DEPLOY_APP_ID }}
          private-key: ${{ secrets.OPERATIONS_DEPLOY_APP_KEY }}
          owner: opensanctions
          repositories: operations
      - name: Trigger ETL deploy
        # Cloud Run pulls zavod-ui via Google Artifact Registry (GAR),
        # specifically the remote repository `opensanctions-ghcr` that
        # mirrors ghcr.io. Something on the Google side caches it in a
        # way that makes tag-based deploys unreliable, so we pass the
        # resolved digest to force a fresh pull.
        run: |
          curl --fail --silent --show-error --location -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/opensanctions/operations/actions/workflows/deploy-zavod-ui.yml/dispatches \
            -d '{
                  "ref": "main",
                  "inputs": {
                    "environment": "${{ github.ref == 'refs/heads/main' && 'prod' || 'test' }}",
                    "image_version": "@${{ needs.docker.outputs.digest }}"
                  }
                }'
