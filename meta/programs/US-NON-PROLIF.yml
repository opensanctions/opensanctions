id: 29
title: Non-Proliferation Sanctions
key: US-NON-PROLIF
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/non-proliferation-sanctions
summary: Targets individuals and entities that engage in activities contributing
  to the proliferation of nuclear, biological, or chemical weapons or their
  means of delivery, together with persons who provide them support, goods, or
  services. Property of designated persons under US jurisdiction is blocked,
  and US persons are generally prohibited from transactions with them.
