id: 13
title: Cuba Sanctions
key: US-CUBA
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/cuba-sanctions
summary: The United States maintains a comprehensive embargo on Cuba under the
  Cuban Assets Control Regulations, which block property of the Cuban
  government and Cuban nationals and broadly prohibit trade, travel-related
  transactions, and financial dealings involving Cuba by persons subject to US
  jurisdiction. Imports of Cuban-origin goods are barred, most exports to Cuba
  require US government authorization, and vessels that call at Cuban ports
  are temporarily banned from US ports. Executive Order 14404 adds
  designation-based sanctions on persons operating in key sectors of the Cuban
  economy, supporting the Cuban government, or responsible for serious human
  rights abuse or corruption; designated persons are blocked and barred from
  entry into the United States, and foreign financial institutions transacting
  with them risk losing access to US correspondent banking.
