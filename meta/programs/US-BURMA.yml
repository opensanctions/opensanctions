id: 8
title: Burma-Related Sanctions
key: US-BURMA
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/burma
summary: Targets persons responsible for the February 2021 military coup in
  Burma and the repression that followed, including military and security
  leaders and their family members, arms and jet-fuel suppliers, and
  military-controlled or state-owned companies in sectors such as defence,
  gems, and oil and gas. Designated persons have their US assets frozen and US
  persons may not deal with them; designated individuals are also barred from
  entry into the United States. A directive additionally prohibits US persons
  from providing financial services to or for the benefit of the state-owned
  Myanma Oil and Gas Enterprise.
issuer: us_ofac
