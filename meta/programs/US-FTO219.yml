id: 297
title: US Immigration and Nationality Act Section 219
key: US-FTO219
url: https://www.govinfo.gov/content/pkg/USCODE-2023-title8/html/USCODE-2023-title8-chap12-subchapII-partII-sec1189.htm
summary: The US Secretary of State designates foreign organizations as Foreign
  Terrorist Organizations when they engage in terrorist activity or terrorism
  that threatens the security of US nationals or the national security of the
  United States. US financial institutions must block funds in which a
  designated organization or its agent has an interest, knowingly providing
  material support or resources to a designated organization is a federal
  crime, and alien members and representatives of a designated organization
  are inadmissible to the United States.
