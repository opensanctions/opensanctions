id: 321
title: Saudi Arabia Counter-Terrorism (UNSCR 1373) Sanctions Regime
key: SA-UNSC1373
url: https://pctc.pss.gov.sa/wps/portal/departments/pcct/lists/
summary: Saudi Arabia implements UN Security Council Resolution 1373 (2001) through a
  National Terrorism List maintained by the Permanent Committee for Counter-Terrorism
  (PCCT) under the Presidency of State Security. The regime imposes asset freezes and
  other measures on individuals, entities and vessels designated for their involvement
  in, or support of, terrorist acts.
