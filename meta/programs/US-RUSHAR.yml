id: 31
title: Russian Harmful Foreign Activities Sanctions
key: US-RUSHAR
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/russian-harmful-foreign-activities-sanctions
summary: Targets persons responsible for or supporting specified harmful
  foreign activities of the Russian government, including election
  interference, malicious cyber activity, transnational corruption, and the
  invasion of Ukraine, and extends to persons operating in sectors of the
  Russian economy such as finance, defence, and technology. Designated persons
  have their US assets frozen and US persons may not deal with them. The
  program also imposes country-wide prohibitions, including bans on imports of
  Russian energy products, seafood, diamonds, and gold, on new investment in
  Russia, on exports of luxury goods, and on providing accounting, management
  consulting, and certain other professional services to Russia. Directives
  further restrict dealings in Russian sovereign debt and transactions with
  major Russian financial institutions, including the Central Bank.
