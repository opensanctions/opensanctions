id: 34
title: Sudan and Darfur Sanctions
key: US-DARFUR
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/sudan-and-darfur-sanctions
summary: Targets people and entities contributing to the conflict in Sudan's
  Darfur region, implementing in part the UN Security Council's Darfur
  sanctions, as well as those destabilizing Sudan and undermining its
  transition to democracy, including the parties to the armed conflict that
  broke out in April 2023. Designated persons have their US assets frozen and
  US persons are barred from transactions with them. Individuals designated
  under the Sudan stabilization authority are also barred from entry into
  the United States; the Darfur authority carries no entry ban.
