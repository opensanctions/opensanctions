id: 271
title: Correspondent Account or Payable-Through Account Sanctions List
key: US-CAPTA
url: https://ofac.treasury.gov/other-ofac-sanctions-lists
summary: Targets foreign financial institutions found to meet criteria under US
  sanctions authorities concerning North Korea, Iran, Hizballah, and Russia,
  such as knowingly conducting or facilitating significant transactions for
  sanctioned persons. US financial institutions are prohibited from opening or
  maintaining a correspondent account or payable-through account for a listed
  institution, or must apply the strict conditions specified in its listing.
  Listing restricts access to the US financial system but does not itself
  block the institution's property.
issuer: us_ofac
dataset: us_ofac_cons
aliases:
