id: 43
title: BIS Denied Persons List (DPL)
key: US-BIS-DPL
url: https://www.bis.gov/licensing/end-user-guidance/denied-persons-list-dpl
summary: Lists individuals and companies whose export privileges have been denied
  by the Bureau of Industry and Security, usually following an enforcement action
  for violations of US export control law. Denied persons may not participate,
  directly or indirectly, in transactions involving items subject to the Export
  Administration Regulations, and others are prohibited from dealing with them in
  such transactions. The scope and duration of each denial are set out in the
  individual denial order.
