# WINDING DOWN — the EO 13936 national emergency expired on July 14, 2026, and
# persons blocked solely under the order were removed from the SDN List. The
# program persists only through Hong Kong Autonomy Act designations, which OFAC
# now carries on the Non-SDN Menu-Based Sanctions (NS-MBS) List.
id: 19
title: Hong Kong-Related Sanctions
key: US-HONGKONG
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/hong-kong-related-sanctions
summary: Targeted foreign persons determined to undermine Hong Kong's autonomy
  or the freedoms of its residents, including officials involved in developing
  and implementing the national security law, under Executive Order 13936 and
  the Hong Kong Autonomy Act. Designated persons had their US assets blocked
  and designated individuals were barred from entry into the United States.
  The national emergency declared in EO 13936 expired on July 14, 2026;
  persons blocked solely under the order have been removed from the SDN List,
  while persons who remain sanctioned under the Hong Kong Autonomy Act have
  been moved to the Non-SDN Menu-Based Sanctions List, with assets blocked
  before that date remaining blocked.
