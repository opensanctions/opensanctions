id: 23
title: Lebanon-Related Sanctions
key: US-LEBANON
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/lebanon-related-sanctions
summary: Targets persons who undermine Lebanon's democratically elected
  government or democratic institutions, contribute to the deliberate breakdown
  of the rule of law in Lebanon, including through politically motivated
  violence and intimidation, support the reassertion of Syrian control or
  interference in Lebanon, or otherwise infringe upon Lebanese sovereignty.
  Designated persons are subject to a US asset freeze, and US persons are
  prohibited from dealing with them. Hizballah-related designations are
  generally made under separate US counterterrorism authorities.
