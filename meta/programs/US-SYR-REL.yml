id: 36
title: Promoting Accountability for Assad and Regional Stabilization Sanctions (PAARSS)
key: US-SYR-REL
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/paarss
summary: Targets Bashar al-Assad and his associates, persons responsible for
  human rights abuses in Syria, Captagon traffickers, persons linked to Syria's
  past proliferation activities, and other destabilizing regional actors under
  Executive Order 13894, as amended. It is the principal remaining US sanctions
  authority for Syria after the broader Syria sanctions program was revoked
  effective July 1, 2025. Designated persons are subject to an asset freeze and
  barred from entry into the United States, and foreign financial institutions
  that knowingly facilitate significant transactions for them can be cut off
  from US correspondent and payable-through accounts.
