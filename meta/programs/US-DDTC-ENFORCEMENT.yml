url: https://www.pmddtc.state.gov/ddtc_public?id=ddtc_kb_article_page&sys_id=384b968adb3cd30044f9ff621f961941
summary: Records civil enforcement actions concluded by the US Department of
  State's Directorate of Defense Trade Controls against companies that violated
  the Arms Export Control Act or the International Traffic in Arms Regulations.
  Cases typically conclude with a consent agreement under which the company pays
  a civil penalty and commits to remedial compliance measures, in some cases
  under external oversight such as a special compliance officer. The obligations
  imposed vary from agreement to agreement.
