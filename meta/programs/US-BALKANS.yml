id: 6
title: Balkans-Related Sanctions
key: US-BALKANS
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/balkans-related-sanctions
summary: Targets persons who threaten the peace, security, stability, or
  territorial integrity of the Western Balkans, undermine democratic processes
  or institutions and post-war agreements in the region, or are responsible
  for serious human rights abuse or significant corruption there. Designated
  persons are subject to an asset freeze and barred from entry into the United
  States.
