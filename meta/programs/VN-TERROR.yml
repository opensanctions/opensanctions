title: List of Terrorist Organizations and Individuals
key: VN-TERROR
url: https://bocongan.gov.vn/to-chuc-khung-bo
summary: Under Vietnam's 2013 Law on Counter-Terrorism (Law No. 28/2013/QH13) and its
  implementing Decree No. 122/2013/NĐ-CP (as amended by Decree No. 93/2024/NĐ-CP),
  the Ministry of Public Security designates organisations and individuals as
  terrorists or terrorism financers. All organisations and individuals in Vietnam
  must freeze, seal and sequester the funds and assets of the listed parties without
  delay.
