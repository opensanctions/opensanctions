id: 47
title: Cuba Prohibited Accommodations List
key: US-DOS-CU-PAL
url: https://www.state.gov/cuba-sanctions/cuba-prohibited-accommodations-list
summary: Lists properties in Cuba that are owned or controlled by the Cuban
  government, prohibited officials of the Government of Cuba, prohibited
  members of the Cuban Communist Party, or their close relatives. Persons
  subject to US jurisdiction are generally prohibited from lodging, paying for
  lodging, or making reservations for anyone to lodge at a listed property.
  The restriction applies to dealings with the listed properties and does not
  block assets.
issuer: us_state
