summary: |
  > Structure and composition of management bodies of the military-industrial complex of the
  > russian federation

  > The military-industrial complex of the russian federation has a complicated and multi-level
  > management. Major decisions are made personally by Putin. However, there is a number of
  > collegial and advisory bodies directly and indirectly subordinated to him that form and
  > implement the state policy of the russian military-industrial complex, the state defense
  > order and the transition of the economy to military use. They include the closest and most
  > loyal to the russian president officials of various ranks, representatives of law enforcement
  > agencies and military-industrial enterprises.

