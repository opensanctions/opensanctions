id: 278
title: Section 154 of the United States National Defense Authorization Act for Fiscal
  Year 2024
key: US-NDAA-154
url: https://www.congress.gov/118/plaws/publ31/PLAW-118publ31.pdf
summary: Prohibits the US Department of Defense from using appropriated funds
  to procure batteries produced by certain named Chinese battery manufacturers
  or their successors, beginning on 1 October 2027. A battery is covered when
  a listed entity assembles or manufactures the final product or provides a
  majority of its components; the Secretary of Defense may waive the
  prohibition.
