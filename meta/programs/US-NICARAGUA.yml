id: 28
title: Nicaragua-Related Sanctions
key: US-NICARAGUA
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/nicaragua-related-sanctions
summary: Targets Nicaraguan government officials and persons responsible for
  human rights abuses, significant corruption, and the undermining of
  democratic institutions in Nicaragua, including persons operating in
  identified sectors of the Nicaraguan economy such as gold. Designated
  persons are subject to an asset freeze and barred from entry into the United
  States. Under the Nicaragua Investment Conditionality Act, the United States
  also opposes loans to the Government of Nicaragua at international financial
  institutions.
