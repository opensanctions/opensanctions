id: 26
title: Magnitsky Sanctions
key: US-MAGNITSKY
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/the-magnitsky-sanctions
summary: Targets persons responsible for the detention, abuse, or death of
  Russian tax lawyer Sergei Magnitsky, for the financial fraud he uncovered,
  or for concealing the legal liability of those involved, as well as persons
  responsible for extrajudicial killings, torture, or other gross human rights
  violations committed against whistleblowers or human rights defenders in
  Russia. Designated persons have their assets within US jurisdiction blocked,
  and designated individuals are ineligible for US visas.
issuer: us_ofac
dataset: us_ofac_sdn
aliases:
  - MAGNIT
  - Magnitsky Act
  - Sergei Magnitsky Rule of Law Accountability Act of 2012
  - Russia and Moldova Jackson–Vanik Repeal and Sergei Magnitsky Rule of Law
    Accountability Act of 2012
measures:
  - Asset freeze
  - Travel ban
