id: 258
title: Section 1286 of the John S. McCain National Defense Authorization Act for
  Fiscal Year 2019 (Public Law 115-232)
key: US-MCCAIN-1286
url: https://basicresearch.defense.gov/Programs/Academic-Research-Security/
summary: The US Department of Defense publishes lists of foreign institutions,
  mainly in China and Russia, confirmed as engaging in problematic activity such
  as the unwanted transfer of US research and technology, together with foreign
  talent recruitment programs confirmed as posing a threat to US national
  security interests. The lists support security reviews of Department-funded
  fundamental research, informing whether proposals involving listed
  institutions or programs require risk mitigation. Listing itself imposes no
  asset freeze or trade restriction.
issuer: us_dod
