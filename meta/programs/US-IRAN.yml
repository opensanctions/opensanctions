id: 21
title: Iran Sanctions
key: US-IRAN
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/iran-sanctions
summary: Combines a comprehensive embargo on Iran with designation-based blocking
  sanctions. The Iranian Transactions and Sanctions Regulations prohibit most US
  trade with Iran, including imports of Iranian-origin goods, exports of goods
  and services to Iran, and new investment in Iran. Designations target the
  Government of Iran, Iranian financial institutions, the Islamic Revolutionary
  Guard Corps, and persons involved in Iran's petroleum, petrochemical, metals,
  and financial sectors, conventional arms activity, or serious human rights
  abuses; designated persons are subject to an asset freeze and, under several
  authorities, barred from entry into the United States. Foreign financial
  institutions that knowingly facilitate significant transactions for designated
  persons or sanctioned sectors risk losing access to US correspondent accounts.
