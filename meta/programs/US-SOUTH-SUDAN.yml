id: 33
title: South Sudan-Related Sanctions
key: US-SOUTH-SUDAN
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/south-sudan-related-sanctions
summary: Targets people and entities responsible for actions that threaten
  the peace, security, or stability of South Sudan, including expanding the
  conflict, obstructing reconciliation or peace processes, attacking
  peacekeeping operations, obstructing humanitarian assistance, committing
  human rights abuses, or recruiting child soldiers. Designated persons have
  their US assets frozen and US persons are barred from transactions with
  them; designated individuals are also barred from entry into the United
  States.
