id: 187
title: Section 353 of the Corrupt and Undemocratic Actors Report
key: US-CORRUPT-353
url: https://www.state.gov/reports/section-353-corrupt-and-undemocratic-actors-report-2023/
summary: Lists foreign persons determined to have knowingly engaged in
  significant corruption, obstruction of investigations into such corruption,
  or actions that undermine democratic processes or institutions in
  El Salvador, Guatemala, Honduras, or Nicaragua. Listed persons were
  ineligible for visas and admission to the United States, and any existing
  visas were revoked. The sanctions authority expired in December 2023;
  persons designated under it may again apply for US visas, and no new
  designations are being made.
