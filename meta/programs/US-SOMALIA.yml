id: 32
title: Somalia Sanctions
key: US-SOMALIA
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/somalia-sanctions
summary: Targets people and entities contributing to the conflict in Somalia,
  including those threatening its peace and stability, obstructing
  humanitarian assistance, recruiting child soldiers, engaging in piracy off
  the Somali coast, or supporting Al-Shabaab. It implements in part the UN
  Security Council's Somalia sanctions regime, alongside US-specific criteria
  such as the misappropriation of Somali public assets. Designated persons
  have their US assets frozen and US persons are barred from transactions
  with them; the program also prohibits the importation of Somali charcoal
  into the United States.
