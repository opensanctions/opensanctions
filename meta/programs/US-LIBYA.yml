id: 24
title: Libya Sanctions
key: US-LIBYA
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/libya-sanctions
summary: Targets persons who threaten the peace, security, or stability of
  Libya, including through the illicit exploitation of Libyan petroleum,
  attacks on Libyan state facilities, obstruction of the UN-facilitated
  political transition, or the misappropriation of Libyan state assets, as well
  as senior members of the former Qadhafi regime and their supporters.
  Designated persons are subject to a US asset freeze and are barred from entry
  into the United States. The program operates alongside the related UN Security
  Council sanctions on Libya.
