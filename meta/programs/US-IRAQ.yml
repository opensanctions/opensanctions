id: 22
title: Iraq-Related Sanctions
key: US-IRAQ
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/iraq-related-sanctions
summary: Targets senior officials of the former Saddam Hussein regime and their
  immediate family members, as well as persons committing or supporting acts of
  violence that threaten the peace or stability of Iraq or undermine efforts to
  promote its economic reconstruction and political reform. Designated persons
  are subject to a US asset freeze, and US persons are prohibited from dealing
  with them. The regime also protects the Development Fund for Iraq and Iraqi
  petroleum interests from attachment and other judicial process.
