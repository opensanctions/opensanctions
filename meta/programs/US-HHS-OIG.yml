id: 298
title: List of Excluded Individuals/Entities (LEIE)
key: US-HHS-OIG
url: https://oig.hhs.gov/exclusions/
summary: The Office of Inspector General of the US Department of Health and Human
  Services excludes individuals and entities from Medicare, Medicaid, and all
  other federally funded health care programs, typically following convictions
  for health care fraud or patient abuse or neglect, license revocations, and
  related misconduct. Federal health care programs make no payment for any items
  or services furnished, ordered, or prescribed by an excluded party, and health
  care organizations that employ or contract with a listed person or entity risk
  civil monetary penalties.
issuer: us_hhs_oig
dataset: us_hhs_exclusions
aliases:
