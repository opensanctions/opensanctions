id: 30
title: North Korea Sanctions
key: US-NK
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/north-korea-sanctions
summary: Combines a comprehensive embargo on North Korea with designation-based
  blocking sanctions. The North Korea Sanctions Regulations block the
  Government of North Korea and the Workers' Party of Korea and prohibit most
  US trade with the country, including imports of North Korean goods, services,
  and technology, exports to North Korea, and new investment there.
  Designations target persons involved in North Korea's weapons programmes,
  arms trade, sanctions evasion, overseas labour exports, and revenue
  generation for the government; designated persons are subject to an asset
  freeze and barred from entry into the United States. Further measures bar
  vessels and aircraft that have recently visited North Korea from the United
  States and cut off foreign financial institutions that facilitate North
  Korean transactions from US correspondent accounts.
