key: US-SYR
url: https://www.federalregister.gov/documents/2011/08/22/2011-21505/blocking-property-of-the-government-of-syria-and-prohibiting-certain-transactions-with-respect-to
summary: The comprehensive US sanctions program on Syria was revoked effective
  July 1, 2025, when Executive Order 14312 rescinded the six executive orders
  underlying it and OFAC removed the Syrian Sanctions Regulations from the Code
  of Federal Regulations; the Caesar Act was subsequently repealed. While in
  force, the program blocked the property of the Government of Syria and of
  designated regime officials and supporters, banned new investment in Syria,
  the export of US services to Syria, and imports of Syrian-origin petroleum,
  and restricted exports of most US goods to Syria. Persons designated solely
  under these authorities have been removed from the SDN List; sanctions on
  Bashar al-Assad, his associates, and other destabilizing actors continue
  under the separate PAARSS program.
