id: 188
title: Uyghur Forced Labor Prevention Act (Public Law No. 117-78)
key: US-UFLPA
url: https://www.dhs.gov/uflpa
summary: Establishes a rebuttable presumption that goods mined, produced, or
  manufactured wholly or in part in China's Xinjiang Uyghur Autonomous Region,
  or by entities on the UFLPA Entity List, are made with forced labor and are
  prohibited from importation into the United States. The interagency Forced
  Labor Enforcement Task Force, chaired by the Department of Homeland Security,
  lists entities that use the forced labor of Uyghurs and members of other
  persecuted groups, work with the Xinjiang government in labor-transfer
  schemes, or source material from Xinjiang. US Customs and Border Protection
  enforces the presumption at the border, and importers must rebut it to obtain
  the release of detained goods.
