id: 15
title: Democratic Republic of the Congo-Related Sanctions
key: US-DRC
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/democratic-republic-of-the-congo-related-sanctions
summary: Targets political and military leaders of armed groups operating in
  the Democratic Republic of the Congo and others contributing to the
  conflict there, including through violence against civilians, recruitment
  of child soldiers, obstruction of humanitarian assistance, attacks on
  peacekeeping missions, arms supplies to armed groups, or the illicit trade
  in natural resources that supports them. It implements in part the UN
  Security Council's DRC sanctions regime. Designated persons have their US
  assets frozen, and US persons are barred from transactions with them.
