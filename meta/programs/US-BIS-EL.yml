id: 2
title: BIS Entity List (EL)
key: US-BIS-EL
url: https://www.ecfr.gov/current/title-15/subtitle-B/chapter-VII/subchapter-C/part-744/appendix-Supplement%20No.%204%20to%20Part%20744
summary: Lists foreign businesses, research institutions, government and private
  organizations, and individuals reasonably believed to be involved, or to pose a
  significant risk of becoming involved, in activities contrary to the national
  security or foreign policy interests of the United States. Exports, reexports,
  and in-country transfers of items subject to the Export Administration
  Regulations to a listed party require a license from the Bureau of Industry and
  Security, and most license exceptions are unavailable. The items covered and
  the license review policy vary by entry.
