id: 218
title: List of Restricted Entities and Subentities Associated With Cuba
key: US-DOS-CU-REA
url: https://www.state.gov/division-for-counter-threat-finance-and-sanctions/cuba-restricted-list
summary: Lists entities and subentities that are under the control of, or act
  for or on behalf of, the Cuban military, intelligence, or security services,
  and with which direct financial transactions would disproportionately
  benefit those services at the expense of the Cuban people or private
  enterprise in Cuba. Persons subject to US jurisdiction are generally
  prohibited from direct financial transactions with listed entities. Listing
  does not block assets.
issuer: us_state
dataset: us_cuba_sanctions
aliases:
