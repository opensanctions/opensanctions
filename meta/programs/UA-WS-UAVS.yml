id: 307
title: UAV manufacturers
key: UA-WS-UAVS
url: https://war-sanctions.gur.gov.ua/en/uav/companies
summary: |
  Ukraine's GUR lists companies in the context of their note

  > Along with its use against military targets, russia systematically uses unmanned systems
  > to terrorize the civilian population of Ukraine.
  >
  > In the context of a full-scale war, there is practically no market for civilian
  > unmanned systems in russia, and almost the entire industry is working to supply
  > russian troops in Ukraine. Most of the companies involved are still not under
  > sanctions and have access to foreign technology, equipment and components.
  >
  > The civilized world should synchronize and intensify efforts against russian UAV
  > manufacturers by imposing sanctions, limiting supplies, and strengthening control
  > and accountability.

