id: 16
title: Ethiopia-Related Sanctions
key: US-ETHIOPIA
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/ethiopia
summary: Targets persons contributing to the conflict and humanitarian crisis
  in northern Ethiopia, including those responsible for prolonging the
  conflict, obstructing a ceasefire or humanitarian access, or committing
  serious human rights abuses. The authority provides a menu of possible
  measures ranging from asset blocking to financing and foreign-exchange
  restrictions; persons designated to date are subject to an asset freeze, and
  designated individuals are barred from entry into the United States.
