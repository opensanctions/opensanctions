id: 18
title: Global Magnitsky Sanctions
key: US-GLOMAG
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/global-magnitsky-sanctions
summary: Targets foreign persons responsible for serious human rights abuse or
  corruption anywhere in the world, including current or former government
  officials involved in such conduct and persons who materially assist them.
  Designated persons have their assets within US jurisdiction blocked, and US
  persons are prohibited from transacting with them. Designated individuals
  are also barred from entry into the United States.
