summary: |
  Ukraine's GUR lists individuals and organizations in the context of their note

  > Everyone involved in the deportation and forced displacement of Ukrainian children
  > must be made known to the world and brought to justice. These include decision-makers,
  > leaders of paramilitary and patriotic youth organisations, camps and educational
  > programmes that "re-educate" children, and employees of russian educational and
  > cultural institutions who carry out indoctrination.
  >
  > Illegal deportation and forced displacement of children are war crimes, and their
  > forced transfer to russian citizenship, change of personal status (name, date and
  > place of birth, information about parents, etc.) and "re-education" are part of
  > the cultural genocide of Ukrainians committed by the enemy.
