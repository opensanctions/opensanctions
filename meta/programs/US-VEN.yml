id: 39
title: Venezuela-Related Sanctions
key: US-VEN
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/venezuela-related-sanctions
summary: Targets the Government of Venezuela and persons responsible for
  corruption, serious human rights abuses, and the undermining of democratic
  institutions in Venezuela, including persons operating in sectors of the
  Venezuelan economy such as gold, oil, and finance. Property of the
  Venezuelan government and of designated persons is blocked, dealings in
  Venezuelan government debt, equity, and digital currency are restricted, and
  designated individuals are barred from entry into the United States. Many
  restrictions are moderated by general licenses that authorize otherwise
  prohibited transactions, including in the oil sector.
