id: 53
title: John S. McCain National Defense Authorization Act for Fiscal Year 2019 (889
  List)
key: US-MCCAIN-889
url: https://www.congress.gov/115/plaws/publ232/PLAW-115publ232.pdf
summary: Prohibits US federal executive agencies from procuring or obtaining
  telecommunications and video surveillance equipment or services produced by
  designated Chinese manufacturers where they serve as a substantial or
  essential component of any system, and from contracting with any entity that
  itself uses such covered equipment or services. The prohibitions, phased in
  between 2019 and 2020, apply government-wide and extend to contract renewals
  and extensions, subject to limited exceptions and waivers.
