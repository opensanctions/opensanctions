id: 45
title: BIS Military End-Users (MEU) List
key: US-BIS-MEU
url: https://www.ecfr.gov/current/title-15/subtitle-B/chapter-VII/subchapter-C/part-744/appendix-Supplement%20No.%207%20to%20Part%20744
summary: Lists foreign parties that the Bureau of Industry and Security has
  determined to be military end users in countries of concern. Exports,
  reexports, and in-country transfers of specified items subject to the Export
  Administration Regulations to a listed party require a license from the Bureau
  of Industry and Security. The list is not exhaustive, and exporters remain
  responsible for determining whether other customers qualify as military end
  users.
