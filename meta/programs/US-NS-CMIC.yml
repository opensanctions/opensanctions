id: 51
title: Non-SDN Chinese Military-Industrial Complex Companies List (NS-CMIC List)
key: US-NS-CMIC
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/chinese-military-companies-sanctions
summary: Lists Chinese companies determined to operate in the defence and
  related materiel sector or the surveillance technology sector of the Chinese
  economy, or to be owned or controlled by companies that do. US persons are
  prohibited from purchasing or selling publicly traded securities of listed
  companies, including derivatives of and instruments providing investment
  exposure to such securities. Listed companies are not blocked, and the
  listing does not restrict other dealings with them.
issuer: us_ofac
dataset: us_ofac_cons
aliases:
  - NS-CMIC
  - EO 13959
  - EO 14032
  - CMIC-EO13959
target_territories:
  - cn
measures:
  - Investment ban
  - Financial restrictions
