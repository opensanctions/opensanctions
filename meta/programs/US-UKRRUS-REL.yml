id: 38
title: Ukraine-/Russia-Related Sanctions
key: US-UKRRUS-REL
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/ukraine-russia-related-sanctions
summary: Targets persons responsible for undermining Ukraine's sovereignty and
  territorial integrity, including those involved in the annexation of Crimea,
  officials and supporters of the Russian government, and persons operating in
  occupied areas of Ukraine. Designated persons have their US assets frozen
  and US persons may not deal with them. The program also imposes
  comprehensive embargoes on the Crimea region and the so-called Donetsk and
  Luhansk People's Republics, prohibiting new investment in those regions,
  imports from them, and exports of goods, services, and technology to them.
  Related restrictions on major Russian financial, energy, and defence
  companies are maintained through the separate Sectoral Sanctions
  Identifications List.
