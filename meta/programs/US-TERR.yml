id: 12
title: Counter Terrorism
key: US-TERR
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/counter-terrorism-sanctions
summary: Targets foreign individuals and entities determined to have committed
  or to pose a significant risk of committing acts of terrorism, along with
  their leaders, agents, financiers, and material supporters. Designated
  persons, most of them listed as Specially Designated Global Terrorists,
  have their assets within US jurisdiction blocked, and US persons are
  prohibited from transacting with them.
