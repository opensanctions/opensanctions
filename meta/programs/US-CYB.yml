id: 14
title: Cyber-Related Sanctions
key: US-CYB
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/sanctions-related-to-significant-malicious-cyber-enabled-activities
summary: Targets persons responsible for or complicit in significant malicious
  cyber-enabled activities, such as attacks on critical infrastructure,
  ransomware operations, misappropriation of funds, trade secrets, or personal
  data, and cyber-enabled interference with election processes. Designated
  persons, including hacking groups and enablers such as virtual currency
  exchanges, have their US assets frozen, and US persons are barred from
  transactions with them.
