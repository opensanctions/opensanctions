id: 7
title: Belarus Sanctions
key: US-BRUS
url: https://ofac.treasury.gov/sanctions-programs-and-country-information/belarus-sanctions
summary: Targets Belarusian officials, state bodies, and their supporters over
  the undermining of democratic processes, electoral fraud, human rights
  abuses, and public corruption in Belarus, as well as persons operating in
  specified sectors of the Belarusian economy, such as the defence and
  security sector. Designated persons have their US assets frozen, and US
  persons are barred from transactions with them.
