id: 41
title: List of Equipment and Services Covered By Section 2 of The Secure Networks
  Act
key: US-FCC
url: https://www.fcc.gov/supplychain/coveredlist
summary: The Federal Communications Commission maintains a list of communications
  equipment and services determined to pose an unacceptable risk to US national
  security or to the security and safety of US persons, based on determinations
  by Congress and federal security agencies. Listings name specific equipment and
  services, largely from Chinese and Russian manufacturers, and may be limited to
  particular uses such as public safety or the security of government facilities.
  Covered equipment cannot obtain the FCC equipment authorization required to be
  imported, marketed, or sold in the United States, and the Commission can also
  halt further importation and marketing of previously authorized covered
  equipment.
