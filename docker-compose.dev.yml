services:
  # overlay on the app service in docker-compose.yml
  app:
    extends:
      file: docker-compose.yml
      service: app
    environment:
      - ZAVOD_DATABASE_URI=postgresql://postgres:password@db:5432/dev
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql

volumes:
  os-db: null
